# Builds the unsigned TasuDownloader .ipa on a free macOS runner. The artifact is
# what SideStore/AltStore installs on the phone; no Mac or paid account needed.
name: iOS App

on:
  workflow_dispatch: {}
  push:
    paths:
      - "ios-app/**"
      - "edge-extension/**"
      - "scripts/build-ios-app-js.js"
      - ".github/workflows/build-ios-app.yml"

jobs:
  build:
    runs-on: macos-15
    # The rolling release below needs write access; artifact upload alone
    # would not.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # macos-15 ships several Xcodes and defaults to 16.4, whose SDK has no
      # Liquid Glass. The UI is written against iOS 26 APIs behind availability
      # checks, so without this the app still builds — it just silently falls
      # back to the pre-26 look everywhere. Pick the newest installed Xcode
      # rather than pinning a version the runner image may drop.
      - name: Select newest Xcode
        run: |
          newest=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using $newest"
          sudo xcode-select -s "$newest"
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Assemble injected JS payload
        run: node scripts/build-ios-app-js.js

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          mkdir -p ios-app/Generated
          xcodegen generate --spec ios-app/project.yml --project ios-app

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project ios-app/TasuDownloader.xcodeproj \
            -scheme TasuDownloader \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log

      # Full logs need a login to read; annotations do not. Surfacing compiler
      # errors as annotations lets failures be diagnosed from the public API.
      - name: Surface compile errors as annotations
        if: failure()
        run: |
          grep -E "error: " build.log | sort -u | head -40 | while IFS= read -r line; do
            echo "::error::${line}"
          done

      - name: Package .ipa
        run: |
          mkdir -p dist Payload
          cp -R "build/Build/Products/Release-iphoneos/TasuDownloader.app" Payload/
          zip -qry "dist/TasuDownloader.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: TasuDownloader-ipa
          path: dist/TasuDownloader.ipa
          retention-days: 14

      # Artifacts need a GitHub login to download; a release asset does not.
      # A rolling "latest" release keeps one stable URL the phone's browser
      # can fetch directly:
      #   https://github.com/<owner>/<repo>/releases/download/latest/TasuDownloader.ipa
      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "TasuDownloader (latest)" \
              --notes "Her push'ta güncellenen son derleme."

          # The release is created once and then only ever uploaded to, so it
          # kept the old product name and an .ipa from before the rename —
          # a stale build sitting on a URL that claims to be current. Reconcile
          # every run instead of only at creation, and drop anything that is
          # not the build this run just produced.
          gh release edit latest --title "TasuDownloader (latest)"
          gh release view latest --json assets --jq '.assets[].name' \
            | grep -vx "TasuDownloader.ipa" \
            | while read -r stale; do
                echo "Eski varlık siliniyor: $stale"
                gh release delete-asset latest "$stale" --yes
              done

          gh release upload latest dist/TasuDownloader.ipa --clobber
