# Builds the unsigned RipSnip .ipa on a free macOS runner. The artifact is
# what SideStore/AltStore installs on the phone; no Mac or paid account needed.
name: iOS App

on:
  workflow_dispatch: {}
  push:
    paths:
      - "ios-app/**"
      - "edge-extension/**"
      - "scripts/build-ios-app-js.js"
      - ".github/workflows/build-ios-app.yml"

jobs:
  build:
    runs-on: macos-15
    # The rolling release below needs write access; artifact upload alone
    # would not.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Assemble injected JS payload
        run: node scripts/build-ios-app-js.js

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          mkdir -p ios-app/Generated
          xcodegen generate --spec ios-app/project.yml --project ios-app

      - name: Build (unsigned)
        run: >
          xcodebuild
          -project ios-app/RipSnip.xcodeproj
          -scheme RipSnip
          -configuration Release
          -destination "generic/platform=iOS"
          -derivedDataPath build
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=""
          build

      - name: Package .ipa
        run: |
          mkdir -p dist Payload
          cp -R "build/Build/Products/Release-iphoneos/RipSnip.app" Payload/
          zip -qry "dist/RipSnip.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: RipSnip-ipa
          path: dist/RipSnip.ipa
          retention-days: 14

      # Artifacts need a GitHub login to download; a release asset does not.
      # A rolling "latest" release keeps one stable URL the phone's browser
      # can fetch directly:
      #   https://github.com/<owner>/<repo>/releases/download/latest/RipSnip.ipa
      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "RipSnip (latest)" \
              --notes "Her push'ta güncellenen son derleme."
          gh release upload latest dist/RipSnip.ipa --clobber
