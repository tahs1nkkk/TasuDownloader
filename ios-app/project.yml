# XcodeGen spec — the Xcode project is generated on the CI runner, never
# committed. This is what makes Mac-less development workable: the project
# definition is reviewable YAML instead of a pbxproj.
name: TasuDownloader
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  TasuDownloader:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      # Resources/generated is produced by scripts/build-ios-app-js.js before
      # xcodegen runs; Assets.xcassets alongside it is committed.
      - path: Resources
        buildPhase: resources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: TasuDownloader
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSPhotoLibraryAddUsageDescription: İndirilen medya Fotoğraflar kitaplığına kaydedilir.
        NSPhotoLibraryUsageDescription: Galeri sekmesi, bu uygulamayla indirilen öğeleri Fotoğraflar kitaplığından gösterir.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        # Deliberately unchanged by the TasuDownloader rename: keeping the
        # identifier means a new build replaces the installed app instead of
        # landing beside it and burning one of the free account's three slots.
        PRODUCT_BUNDLE_IDENTIFIER: com.lsatv.ripsnip
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Unsigned on purpose: SideStore/AltStore re-signs on the phone with a
        # free Apple ID. Signing on CI would need a paid account.
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
schemes:
  TasuDownloader:
    build:
      targets:
        TasuDownloader: all
    run:
      config: Release
